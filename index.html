<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SPEED BUILD 2026 — THE BUREAU</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { background: #000; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100vh; background: #000 !important; -webkit-text-size-adjust: 100%; font-family: 'Share Tech Mono', monospace; color: #fff; }

  /* STANDBY */
  #phase-standby { position: fixed; inset: 0; z-index: 30; background: #000; display: none; }
  #phase-standby img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #glitch-canvas { position: fixed; inset: 0; z-index: 40; display: block; pointer-events: none; background: #000; }

  /* PAGE 1 — BUREAU NARRATIVE */
  #page-one { display: none; position: fixed; inset: 0; z-index: 20; overflow-y: auto; background: #000; }
  #page-one::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px); pointer-events: none; z-index: 100; }

  /* PAGE 2 — BRIEFING */
  #page-two { display: none; position: relative; z-index: 20; background: #000; }
  #page-two::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px); pointer-events: none; z-index: 100; }

  /* SHARED TEXT STYLES */
  .narrative-inner { max-width: 680px; margin: 0 auto; padding: clamp(48px,10vw,100px) clamp(24px,6vw,48px); min-height: 100vh; background: #000; font-size: clamp(13px,2vw,16px); line-height: 1.9; width: 100%; box-sizing: border-box; }

  .ln { display: block; min-height: 1.9em; white-space: pre-wrap; word-break: break-word; }
  .ln.gap { display: block; min-height: 1.9em; }
  .ln.red { color: #FF2222; text-shadow: 0 0 12px rgba(255,40,40,0.9), 0 0 30px rgba(255,0,0,0.5); }
  @keyframes flashOn {
    0% { opacity: 0; }
    20% { opacity: 1; }
    40% { opacity: 0.3; }
    60% { opacity: 1; }
    100% { opacity: 1; }
  }
  .ln.welcome { 
    font-size: clamp(12px,2.3vw,21px); 
    line-height: 1.2;
    color: #fff !important;
    text-shadow: none !important;
    background: #CC0000;
    display: inline-block;
    padding: 4px 12px;
    margin-top: 8px;
    animation: flashOn 0.6s ease-out forwards;
  }
  .ln.dim { color: rgba(255,255,255,0.35); }

  .cursor { display: inline-block; width: 10px; height: 1.1em; background: #fff; vertical-align: text-bottom; margin-left: 2px; animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* CLOCKS */
  .clocks { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: clamp(40px,6vh,72px); border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: clamp(24px,4vh,48px); width: 100%; align-items: stretch; }
  .clock-unit { text-align: center; padding: 0 8px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; }
  .clock-unit:first-child { border-right: 1px solid rgba(255,255,255,0.08); }
  .clock-time-wrap { display: flex; align-items: flex-start; gap: 2px; justify-content: center; }
  .time-segment { display: flex; flex-direction: column; align-items: center; }
  .clock-sep { font-family: 'Share Tech Mono', monospace; font-size: clamp(28px,6vw,52px); color: #fff; line-height: 1; padding-top: 2px; }
  .time-label { font-size: clamp(7px,1vw,9px); letter-spacing: 2px; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-top: 4px; }
  .clock-value { font-family: 'Share Tech Mono', monospace; font-size: clamp(28px,6vw,52px); color: #fff; line-height: 1; letter-spacing: 1px; font-weight: bold; }
  .clock-value.red { font-size: clamp(28px,6vw,52px); color: #FF2222; text-shadow: 0 0 20px rgba(255,40,40,1), 0 0 50px rgba(255,0,0,0.7), 0 0 80px rgba(255,0,0,0.3); }
  .clock-label { font-size: clamp(9px,1.4vw,11px); letter-spacing: 4px; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-top: 10px; }

  /* SECTION DIVIDER */
  .section-gap { display: block; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.08); margin: clamp(24px,4vh,40px) 0; }
  .ln.section-header { font-family: 'Share Tech Mono', monospace; font-size: clamp(12px,1.8vw,15px); letter-spacing: 6px; color: #fff; text-transform: uppercase; min-height: auto; font-weight: bold; margin-top: 8px; }

  /* BUTTONS */
  .btn-wrap { margin-top: 48px; display: none; }
  .btn-wrap.visible { display: block; }
  .btn-action { font-family: 'Share Tech Mono', monospace; font-size: clamp(11px,1.8vw,13px); letter-spacing: 4px; text-transform: uppercase; color: #CC0000; background: #fff; border: none; padding: 14px 40px; cursor: pointer; transition: all 0.15s; }
  .btn-action:hover { background: #CC0000; color: #fff; }
  .btn-action::after { content: '_'; animation: blink 0.8s step-end infinite; margin-left: 3px; }

  /* SKIP */
  .skip { position: fixed; bottom: 24px; right: 24px; font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 4px; color: #fff; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.4); padding: 8px 18px; cursor: pointer; text-transform: uppercase; z-index: 200; transition: all 0.15s; display: none; }
  .skip.visible { display: block; }
  .skip:hover { background: #fff; color: #000; border-color: #fff; }
</style>
</head>

// ── STATE ──
var CHAR_SPEED = 24;
var LINE_PAUSE = 180;
var SECTION_PAUSE = 500;

var glitchDone = false;

var pageTwoDone = false;

// ── CLOCKS ──
var PAGE_LOAD = Date.now();
var PRIZE_START = 20000, PRIZE_END = 0;
var DROP_PER_SEC = 20; // £20 per second
var lastPound = PRIZE_START;
var clocksStarted = false;

function startClocks() {
  if (clocksStarted) return;
  clocksStarted = true;
  // Both clocks hit zero in exactly 3 real minutes
  // 24-hour sim clock runs at 480x real speed (24h / 3min = 480x)
  var REAL_DURATION_MS = 3 * 60 * 1000; // 180,000ms
  var SIM_TOTAL_MS = 24 * 60 * 60 * 1000; // 24h in ms
  var clockStart = Date.now();

  function tick() {
    var elapsed = Date.now() - clockStart;
    var progress = Math.min(elapsed / REAL_DURATION_MS, 1);

    // Prize: 20000 -> 0 over 3 minutes
    var current = Math.max(0, 20000 * (1 - progress));
    var pounds = Math.floor(current);
    var pence = String(Math.floor((current - pounds) * 100)).padStart(2,'0');
    var prizeEl = document.getElementById('clock-prize');
    if (prizeEl) prizeEl.textContent = '$' + pounds.toLocaleString() + '.' + pence;

    // Timer: 24:00:00 -> 00:00:00 over 3 minutes
    var simRem = SIM_TOTAL_MS * (1 - progress);
    var hrs  = Math.floor(simRem / 3600000);
    var mins = Math.floor((simRem % 3600000) / 60000);
    var secs = Math.floor((simRem % 60000) / 1000);
    var hEl=document.getElementById('clock-hrs');
    var mEl=document.getElementById('clock-mins');
    var sEl=document.getElementById('clock-secs');
    if(hEl) hEl.textContent=String(hrs).padStart(2,'0');
    if(mEl) mEl.textContent=String(mins).padStart(2,'0');
    if(sEl) sEl.textContent=String(secs).padStart(2,'0');

    if (progress < 1) requestAnimationFrame(tick);
  }
  tick();
}

// ── CANVAS / GLITCH ──
var canvas = document.getElementById('glitch-canvas');
var ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width=Math.max(window.innerWidth||0,100); canvas.height=Math.max(window.innerHeight||0,100); }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

function runStaticPhase(onComplete) {
  var duration=1000, start=null;
  function frame(ts) {
    if(!start)start=ts;
    var elapsed=ts-start, progress=elapsed/duration, intensity=0.3+progress*0.7;
    var w=canvas.width,h=canvas.height;
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    var id=ctx.getImageData(0,0,w,h),d=id.data,noiseAmt=0.06+intensity*0.12;
    for(var i=0;i<d.length;i+=4){if(Math.random()<noiseAmt){var roll=Math.random();if(roll<0.6){var v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}else if(roll<0.8){d[i]=200+Math.random()*55;d[i+1]=0;d[i+2]=0;d[i+3]=255;}else{d[i]=0;d[i+1]=180+Math.random()*75;d[i+2]=0;d[i+3]=255;}}}
    ctx.putImageData(id,0,0);
    var numBars=Math.floor(2+intensity*8);
    for(var i=0;i<numBars;i++){var ly=Math.floor(Math.random()*h),lh=Math.floor(Math.random()*(8*intensity)+1),r2=Math.random();if(r2<0.35)ctx.fillStyle='rgba(255,20,20,'+(0.4+Math.random()*0.6*intensity)+')';else if(r2<0.55)ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.random()*0.5*intensity)+')';else if(r2<0.7)ctx.fillStyle='rgba(0,255,0,'+(0.2+Math.random()*0.4*intensity)+')';else if(r2<0.83)ctx.fillStyle='rgba(255,200,0,'+(0.2+Math.random()*0.4*intensity)+')';else ctx.fillStyle='rgba(180,0,255,'+(0.2+Math.random()*0.3*intensity)+')';ctx.fillRect(0,ly,w,lh);}
    if(Math.random()<0.02*intensity){ctx.fillStyle='rgba(255,255,255,'+(Math.random()*0.15)+')';ctx.fillRect(0,0,w,h);}
    if(elapsed<duration){requestAnimationFrame(frame);}else{if(!glitchDone)onComplete();}
  }
  requestAnimationFrame(frame);
}

function glitchPass(off, direction, onComplete) {
  var frame=0, total=direction==='in'?120:210, w=canvas.width, h=canvas.height;
  function gf() {
    var progress=frame/total;
    if(direction==='in'){
      var rev=1-progress;ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
      var slices=Math.floor(2+progress*30);
      for(var i=0;i<slices;i++){var sy=Math.floor(Math.random()*h),sh=Math.floor(Math.random()*(h/slices*3)+4),offset=(Math.random()-0.5)*200*rev;ctx.drawImage(off,0,sy,w,sh,offset,sy,w,sh);}
      if(rev>0.2){ctx.globalCompositeOperation='screen';for(var i=0;i<6;i++){var sy=Math.floor(Math.random()*h);ctx.fillStyle='rgba(255,0,60,'+(Math.random()*0.5*rev)+')';ctx.fillRect((Math.random()-0.5)*60,sy,w,Math.random()*10+1);ctx.fillStyle='rgba(0,220,255,'+(Math.random()*0.4*rev)+')';ctx.fillRect((Math.random()-0.5)*60,sy+3,w,Math.random()*8+1);}ctx.globalCompositeOperation='source-over';}
      if(rev>0.3){var imgData=ctx.getImageData(0,0,w,h),dd=imgData.data;for(var i=0;i<dd.length;i+=4){if(Math.random()<0.06*rev){var v=Math.random()*255;dd[i]=dd[i+1]=dd[i+2]=v;dd[i+3]=200;}}ctx.putImageData(imgData,0,0);}
      if(progress>0.85){ctx.globalAlpha=(progress-0.85)/0.15;ctx.drawImage(off,0,0,w,h);ctx.globalAlpha=1;}
    } else {
      var phase=progress<0.3?1:progress<0.6?2:progress<0.85?3:4;
      ctx.drawImage(off,0,0,w,h);
      if(phase===1){if(Math.random()<0.3){var sy=Math.floor(Math.random()*h);ctx.drawImage(off,0,sy,w,Math.floor(Math.random()*4+1),(Math.random()-0.5)*20,sy,w,Math.floor(Math.random()*4+1));}if(Math.random()<0.15){ctx.globalCompositeOperation='screen';ctx.fillStyle='rgba(255,0,60,0.08)';ctx.fillRect(0,Math.random()*h,w,Math.random()*3+1);ctx.globalCompositeOperation='source-over';}}
      if(phase===2){var slices=Math.floor(2+(progress-0.3)*20);for(var i=0;i<slices;i++){if(Math.random()<0.6){var sy=Math.floor(Math.random()*h),sh=Math.floor(Math.random()*20+1);ctx.drawImage(off,0,sy,w,sh,(Math.random()-0.5)*60*((progress-0.3)/0.3),sy,w,sh);}}ctx.globalCompositeOperation='screen';var p2=(progress-0.3)/0.3;for(var i=0;i<4;i++){var sy=Math.floor(Math.random()*h);ctx.fillStyle='rgba(255,0,60,'+(Math.random()*0.3*p2)+')';ctx.fillRect((Math.random()-0.5)*20,sy,w,Math.random()*8+1);ctx.fillStyle='rgba(0,220,255,'+(Math.random()*0.25*p2)+')';ctx.fillRect((Math.random()-0.5)*20,sy+3,w,Math.random()*8+1);}ctx.globalCompositeOperation='source-over';if(Math.random()<0.04){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);}}
      if(phase===3){var p3=(progress-0.6)/0.25,slices=Math.floor(8+p3*40);for(var i=0;i<slices;i++){var sy=Math.floor(Math.random()*h),sh=Math.floor(Math.random()*(80*p3)+2);ctx.drawImage(off,0,sy,w,sh,(Math.random()-0.5)*300*p3,sy,w,sh);}ctx.globalCompositeOperation='screen';for(var i=0;i<12;i++){var sy=Math.floor(Math.random()*h);ctx.fillStyle='rgba(255,0,60,'+(Math.random()*0.7*p3)+')';ctx.fillRect((Math.random()-0.5)*80,sy,w,Math.random()*16+1);ctx.fillStyle='rgba(0,220,255,'+(Math.random()*0.6*p3)+')';ctx.fillRect((Math.random()-0.5)*80,sy+4,w,Math.random()*12+1);}ctx.globalCompositeOperation='source-over';var id=ctx.getImageData(0,0,w,h),dd=id.data;for(var i=0;i<dd.length;i+=4){if(Math.random()<0.08*p3){var v=Math.random()*255;dd[i]=dd[i+1]=dd[i+2]=v;dd[i+3]=230;}}ctx.putImageData(id,0,0);if(Math.random()<0.12){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);}if(Math.random()<0.06){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(0,0,w,h);}}
      if(phase===4){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);}
    }
    frame++;
    if(frame<total){requestAnimationFrame(gf);}else{if(!glitchDone)onComplete();}
  }
  requestAnimationFrame(gf);
}

function runGlitch() {
  var img=document.getElementById('standby-img');
  var off=document.createElement('canvas');
  off.width=canvas.width;off.height=canvas.height;
  off.getContext('2d').drawImage(img,0,0,off.width,off.height);

  // Step 1: Pop image on clean — no glitch, just instant appear
  canvas.style.display='block';
  ctx.drawImage(off,0,0,canvas.width,canvas.height);

  // Step 2: Hold clean for 1.5s
  setTimeout(function(){
    if(glitchDone)return;
    // Step 3: Glitch out
    glitchPass(off,'out',function(){
      canvas.style.display='none';
      currentPage='one';
      document.getElementById('page-one').style.display='block';
      document.getElementById('skip-btn').classList.add('visible');
      runPageOne();
    });

  },1500);
}

// ── PAGE ONE TYPING ──
function typeInto(el, text, boldWord, color) {
  return new Promise(function(resolve) {
    if(!text){resolve();return;}
    if(cursorEl)cursorEl.remove();
    cursorEl=document.createElement('span');cursorEl.className='cursor';
    if(color==='red'||color==='welcome'){el.style.color='#fff';el.style.background='#CC0000';el.style.padding='4px 12px';}
    else if(color==='dim'){el.style.color='rgba(255,255,255,0.35)';}
    el.appendChild(cursorEl);
    var i=0, bs=boldWord?text.indexOf(boldWord):-1, be=bs>=0?bs+boldWord.length:-1, bsp=null;
    function tick(){
      if(stopped){resolve();return;}
      if(i>=text.length){resolve();return;}
      if(bs>=0&&i===bs){bsp=document.createElement('strong');cursorEl.insertAdjacentElement('beforebegin',bsp);}
      var c=text[i];
      if(bsp&&i<be){bsp.textContent+=c;}
      else{if(i===be)bsp=null;cursorEl.insertAdjacentText('beforebegin',c);}
      i++;
      setTimeout(tick,CHAR_SPEED+(Math.random()-0.5)*10);
    }
    tick();
  });
}

function runPageOne() {
  var content = document.getElementById('page-one-content');

  var i = 0;
  function next() {
    if(pageOneDone||stopped||i>=PAGE_ONE.length){
      if(pageOneDone)return;
      if(cursorEl)cursorEl.remove();
      // Type out welcome line
      var wgap=document.createElement('span');wgap.className='ln gap';content.appendChild(wgap);
      var welcome=document.createElement('span');welcome.className='ln welcome';content.appendChild(welcome);
      typeInto(welcome,'welcome to speed build 2026.',null,'welcome').then(function(){
        if(cursorEl){cursorEl.remove();cursorEl=null;}
        var wgap2=document.createElement('span');wgap2.className='ln gap';content.appendChild(wgap2);
        setTimeout(function(){
          var btn=document.createElement('div');btn.className='btn-wrap visible';
          var b1=document.createElement('button');b1.className='btn-action';b1.textContent='ACCESS THE BRIEF';b1.onclick=showPageTwo;btn.appendChild(b1);
          content.appendChild(btn);
        }, 1000);
      });
      return;
    }
    var item=PAGE_ONE[i];i++;
    if(item.gap){var g=document.createElement('span');g.className='ln gap';content.appendChild(g);setTimeout(next,100);return;}
    setTimeout(function(){
      if(pageOneDone)return;
      var ln=document.createElement('span');
      ln.className='ln'+(item.color?' '+item.color:'');
      content.appendChild(ln);
      typeInto(ln,item.text,item.bold,item.color).then(function(){
        if(cursorEl){cursorEl.remove();cursorEl=null;}
        setTimeout(next,LINE_PAUSE);
      });
    },item.delay||300);
  }
  next();
}

// ── PAGE TWO ──
function showPageTwo() {
  stopped=false;
  pageTwoDone=false;
  pageTwoRunning=false;
  if(cursorEl){cursorEl.remove();cursorEl=null;}
  document.getElementById('page-one').style.display='none';
  currentPage='two';
  var pt=document.getElementById('page-two');
  pt.style.display='block';
  startClocks();
  window.scrollTo(0,0);
  runPageTwo();
}

function runPageTwo() {
  if(pageTwoRunning)return;
  pageTwoRunning=true;
  pageTwoDone=false;
  stopped=false;
  var cnt=document.getElementById('page-two-content');
  cnt.innerHTML='';
  if(cursorEl){cursorEl.remove();cursorEl=null;}

  var i=0;

  function nextItem(){
    if(pageTwoDone||i>=PAGE_TWO_SECTIONS.length){
      done();return;
    }
    var item=PAGE_TWO_SECTIONS[i++];

    if(item.divider){
      var d=document.createElement('span');d.className='section-gap';cnt.appendChild(d);
      setTimeout(nextItem,400);
      return;
    }

    if(item.header){
      var h=document.createElement('span');h.className='ln section-header';cnt.appendChild(h);
      var hg=document.createElement('span');hg.className='ln gap';cnt.appendChild(hg);
      typeInto(h,item.header,null,null).then(function(){
        if(cursorEl){cursorEl.remove();cursorEl=null;}
        setTimeout(nextItem,300);
      });
      return;
    }

    if(item.text){
      var gap=document.createElement('span');gap.className='ln gap';cnt.appendChild(gap);
      var ln=document.createElement('span');ln.className='ln';cnt.appendChild(ln);
      typeInto(ln,item.text,item.bold||null,null).then(function(){
        if(cursorEl){cursorEl.remove();cursorEl=null;}
        setTimeout(nextItem,180);
      });
      return;
    }

    setTimeout(nextItem,50);
  }

  function done(){
    if(pageTwoDone)return;
    pageTwoDone=true;
    if(cursorEl)cursorEl.remove();
    var gap=document.createElement('span');gap.className='ln gap';cnt.appendChild(gap);
    var btn=document.createElement('div');btn.className='btn-wrap visible';
    var b=document.createElement('button');b.className='btn-action';b.textContent='JOIN THE FIGHT';b.onclick=function(){window.open('https://luma.com/speedbuild2026','_blank');};
    btn.appendChild(b);cnt.appendChild(btn);

  }

  nextItem();
}


function renderPageOneInstant(){
  pageOneDone=true;
  if(cursorEl){cursorEl.remove();cursorEl=null;}
  var c=document.getElementById('page-one-content');
  c.innerHTML='';
  PAGE_ONE.forEach(function(item){
    if(item.gap){var g=document.createElement('span');g.className='ln gap';c.appendChild(g);return;}
    var ln=document.createElement('span');
    ln.className='ln'+(item.color?' '+item.color:'');
    if(item.bold){
      var parts=item.text.split(item.bold);
      ln.appendChild(document.createTextNode(parts[0]));
      var s=document.createElement('strong');s.textContent=item.bold;ln.appendChild(s);
      if(parts[1])ln.appendChild(document.createTextNode(parts[1]));
    } else { ln.textContent=item.text; }
    c.appendChild(ln);
  });
  var wgap=document.createElement('span');wgap.className='ln gap';c.appendChild(wgap);
  var welcome=document.createElement('span');welcome.className='ln welcome';welcome.textContent='welcome to speed build 2026.';c.appendChild(welcome);
  var wgap2=document.createElement('span');wgap2.className='ln gap';c.appendChild(wgap2);
  var btn=document.createElement('div');btn.className='btn-wrap visible';
  var b=document.createElement('button');b.className='btn-action';b.textContent='ACCESS THE BRIEF';b.onclick=showPageTwo;
  btn.appendChild(b);c.appendChild(btn);
}

function skipCurrent() {
  stopped=true;
  glitchDone=true;
  if(cursorEl){cursorEl.remove();cursorEl=null;}

  if(currentPage==='glitch'){
    canvas.style.display='none';
    currentPage='one';
    document.getElementById('page-one').style.display='block';
    document.getElementById('skip-btn').classList.add('visible');
    renderPageOneInstant();
  } else if(currentPage==='one'){
    pageOneDone=true;
    renderPageOneInstant();
    currentPage='one-done';
  } else if(currentPage==='one-done'){
    document.getElementById('page-one').style.display='none';
    currentPage='two';
    stopped=false;
    pageTwoDone=false;
    pageTwoRunning=false;
    document.getElementById('page-two').style.display='block';
    startClocks();
    window.scrollTo(0,0);
    runPageTwo();
  } else if(currentPage==='two'){
    renderPageTwoInstant();
  }
}

function renderPageTwoInstant(){
  pageTwoDone=true;
  pageTwoRunning=false;
  if(cursorEl){cursorEl.remove();cursorEl=null;}
  var cnt=document.getElementById('page-two-content');
  cnt.innerHTML='';
  PAGE_TWO_SECTIONS.forEach(function(item){
    if(item.divider){var d=document.createElement('span');d.className='section-gap';cnt.appendChild(d);return;}
    if(item.header){
      var h=document.createElement('span');h.className='ln section-header';h.textContent=item.header;cnt.appendChild(h);
      var hg=document.createElement('span');hg.className='ln gap';cnt.appendChild(hg);return;
    }
    if(item.text){
      var gap=document.createElement('span');gap.className='ln gap';cnt.appendChild(gap);
      var ln=document.createElement('span');ln.className='ln';
      if(item.bold&&typeof item.bold==='string'){
        var parts=item.text.split(item.bold);
        ln.appendChild(document.createTextNode(parts[0]));
        var s=document.createElement('strong');s.textContent=item.bold;ln.appendChild(s);
        if(parts[1])ln.appendChild(document.createTextNode(parts[1]));
      } else { ln.textContent=item.text; }
      cnt.appendChild(ln);
    }
  });
  var gap=document.createElement('span');gap.className='ln gap';cnt.appendChild(gap);
  var btn=document.createElement('div');btn.className='btn-wrap visible';
  var b=document.createElement('button');b.className='btn-action';b.textContent='JOIN THE FIGHT';b.onclick=function(){window.open('https://luma.com/speedbuild2026','_blank');};
  btn.appendChild(b);cnt.appendChild(btn);

}


// ── START ──
canvas.style.display='block';
runStaticPhase(function(){ runGlitch(); });
</script>
